name: macOS Build and Test

on:
  pull_request:
    branches: [ main ]

jobs:
  # Run Rust tests in parallel
  test-rust:
    name: Rust Tests
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-test-
          ${{ runner.os }}-cargo-

    - name: Run Rust tests
      run: cargo test --release -p termin --lib

  # Build release binary in parallel
  build-release:
    name: Build Release Binary
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-build-
          ${{ runner.os }}-cargo-

    - name: Build Rust binary
      run: cargo build --release -p termin --bin terminai

    - name: Check binary
      run: |
        file target/release/terminai
        otool -L target/release/terminai

    # Commented out for now - not needed on every PR
    # - name: Test installation script
    #   run: |
    #     INSTALL_DIR=$(mktemp -d)
    #     export INSTALL_DIR
    #     ./scripts/install-macos.sh
    #
    #     # Verify installation
    #     ls -la "$INSTALL_DIR/bin/terminai"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: terminai-macos-${{ github.sha }}
        path: |
          target/release/terminai
        retention-days: 30
