# Termin.AI Configuration Example
# Copy this file to ~/.config/terminai/config.yaml and customize

# AI Assistant Configuration
providers:
  - name: anthropic
    # display_name: Anthropic  # uncomment to display a different name than the provider name
    # api_key_env: ANTHROPIC_API_KEY  # uncomment to use an env variable different than the provider's default
    models:
      - name: "Claude Sonnet 4.5"
        model: claude-sonnet-4-5
      - name: "Claude Haiku 4.5"
        model: claude-haiku-4-5
      - name: "Claude Opus 4.5"
        model: claude-opus-4-5
  - name: openai
    models:
      - name: "GPT 5.1"
        model: gpt-5.1
      - name: "GPT 5.1 mini"
        model: gpt-5.1-mini
  - name: openrouter
    models:
      - name: "Gemini 2.5 Pro"
        model: google/gemini-2.5-pro
      - name: "Devstral 2"
        model: mistralai/devstral-2512:free
default_model: anthropic/claude-sonnet-4-5