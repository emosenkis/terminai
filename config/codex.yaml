codex:
  command: codex
  args:
    - --cd
    - "{cwd}"
    - --sandbox
    - workspace-write
    - --ask-for-approval
    - on-request
    - --no-alt-screen
    - -c
    - "developer_instructions={context_prompt_toml}"
    - -c
    - "mcp_servers.terminai.url={mcp_url_toml}"
    - -c
    - 'mcp_servers.terminai.enabled_tools=["check_for_updates","read_terminal","get_terminal_context","suggest_input","get_suggestion_status"]'
    - -c
    - 'mcp_servers.terminai.default_tools_approval_mode="approve"'
    - -c
    - 'mcp_servers.terminai.tools.check_for_updates.approval_mode="approve"'
    - -c
    - 'mcp_servers.terminai.tools.read_terminal.approval_mode="approve"'
    - -c
    - 'mcp_servers.terminai.tools.get_terminal_context.approval_mode="approve"'
    - -c
    - 'mcp_servers.terminai.tools.suggest_input.approval_mode="approve"'
    - -c
    - 'mcp_servers.terminai.tools.get_suggestion_status.approval_mode="approve"'
