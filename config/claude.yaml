claude:
  command: claude
  args:
    - --append-system-prompt
    - "{{context_prompt}}"
    - --mcp-config
    # Claude MCP JSON env expansion: https://code.claude.com/docs/en/mcp#environment-variable-expansion-in-mcp-json
    - '{"mcpServers":{"terminai":{"type":"http","url":"{{mcp_url}}","headers":{"Authorization":"Bearer ${TERMINAI_MCP_AUTH_TOKEN}"}}}}'
    - --strict-mcp-config
