claude:
  command: claude
  show-in-switcher: true
  uses-mcp: true
  uses-tool-cli: true
  args:
    - --append-system-prompt
    - "{{ context_prompt }}"
    # Claude MCP JSON env expansion: https://code.claude.com/docs/en/mcp#environment-variable-expansion-in-mcp-json
    - expr: >-
        ["--mcp-config",
         '{"mcpServers":{"terminai":{"type":"http","url":' ~ (mcp_url|json) ~ ',"headers":{"Authorization":"Bearer ${TERMINAI_MCP_AUTH_TOKEN}"}}}}',
         "--strict-mcp-config"]
        if uses_mcp else []
